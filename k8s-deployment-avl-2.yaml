  labels:
    app: ce-tr-catalogo-admin-b
subjects:
- kind: ServiceAccount
  name: ce-tr-catalogo-admin-b-sa
  namespace: vucem3-apps
roleRef:
  kind: Role
  name: ce-tr-catalogo-admin-b-role
  apiGroup: rbac.authorization.k8s.io

---
# Service - Expone el deployment
apiVersion: v1
kind: Service
metadata:
  name: ce-tr-catalogo-admin-b-service
  namespace: vucem3-apps
  labels:
    app: ce-tr-catalogo-admin-b
    service-type: "rest-api"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/api/sat-catalogo-admin/actuator/prometheus"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: management
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: ce-tr-catalogo-admin-b
  sessionAffinity: None
---

# Ingress - Acceso externo con seguridad mejorada
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ce-tr-catalogo-admin-b-ingress
  namespace: vucem3-apps
  labels:
    app: ce-tr-catalogo-admin-b
    service-type: "rest-api"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ce-tr-catalogo-admin-b.vucem.gob.mx
    secretName: ce-tr-catalogo-admin-b-tls
  rules:
  - host: ce-tr-catalogo-admin-b.vucem.gob.mx
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ce-tr-catalogo-admin-b-service
            port:
              number: 80
---

# ============================================================================
# HorizontalPodAutoscaler (HPA) - Escalado automático de pods
# ============================================================================
# MODIFICABLE: minReplicas, maxReplicas, métricas y umbrales
# FUNCIÓN: Escala automáticamente según CPU/memoria
# IMPORTANTE: Requiere metrics-server instalado en el cluster
# ============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ce-tr-catalogo-admin-b-hpa
  namespace: vucem3-apps
  labels:
    app: ce-tr-catalogo-admin-b
    service-type: "rest-api"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ce-tr-catalogo-admin-b
  
  # MODIFICABLE: Rango de réplicas para auto-escalado
  minReplicas: 1  # AJUSTAR: Mínimo de pods (dev:1, prod:2-3)
  maxReplicas: 4  # AJUSTAR: Máximo de pods (dev:2-4, prod:6-10)
  
  # MODIFICABLE: Métricas y umbrales para escalar
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # AJUSTAR: Escala si CPU promedio > 70% (50-80%)
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
---

# PodDisruptionBudget - Alta disponibilidad
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ce-tr-catalogo-admin-b-pdb
  namespace: vucem3-apps
  labels:
    app: ce-tr-catalogo-admin-b
    service-type: "rest-api"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ce-tr-catalogo-admin-b
---

# NetworkPolicy - Seguridad de red
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ce-tr-catalogo-admin-b-netpol
  namespace: vucem3-apps
  labels:
    app: ce-tr-catalogo-admin-b
    service-type: "rest-api"
spec:
  podSelector:
    matchLabels:
      app: ce-tr-catalogo-admin-b
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: nginx-ingress
    ports:
    - protocol: TCP
      port: 8080
  # Allow from monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080
  # Allow from VUCEM services
  - from:
    - namespaceSelector:
        matchLabels:
          project: "vucem-3.0"
    ports:
    - protocol: TCP
      port: 8080
  # Allow from gateway cross-VPC (NodePort traffic via VPC Peering)
  - from:
    - ipBlock:
        cidr: 10.0.0.0/16
    - ipBlock:
        cidr: 10.1.0.0/16
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # DNS
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  # PostgreSQL
  - to: []
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 5433
    - protocol: TCP
      port: 15432
  # Redis (opcional)
  - to: []
    ports:
    - protocol: TCP
      port: 6379
  # HTTPS/HTTP
  - to: []
    ports:
