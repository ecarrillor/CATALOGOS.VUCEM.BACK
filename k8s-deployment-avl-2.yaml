  name: ce-tr-catalogo-admin-b-role
  labels:
    app: ce-tr-catalogo-admin-b
    service-type: "rest-api"
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
