server:
  port: 8080
  error:
    # No incluir stack trace en respuestas
    include-stacktrace: never
    # No incluir mensaje de excepción
    include-message: never
  #Configuraciones del tomcat
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:10}
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:8192}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:60000}

app:
  interceptor:
    rendimiento: true
  cors:
    allowed-origins:
      - "https://api-v30.cloud-ultrasist.net"
      - "https://front.v30.ultrasist.org"
      - "https://front.v30.ultrasist.net"
      - "https://frontqa.v30.cloud-ultrasist.net"
      - "http://localhost:*"
    allowed-headers: "*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allow-credentials: false
  swagger:
    servers: ${SWAGGER_SERVERS:https://api-v30.cloud-ultrasist.net/|Desarrollo,http://localhost:8080/|Desarrollo Local}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /api/^project.name^/v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    tags-sorter: alpha #Ordena los endpoint alfabéticamente
    defaultModelsExpandDepth: 0  # Colapsa la sección schemas
    doc-expansion: none  # Colapsa todos los tags al cargar la página
    display-request-duration: true  # Muestra la duración de las peticiones de ejemplo
    path: /api/^project.name^/sw-documentacion
    url: /api/^project.name^/sw-documentacion
spring:
  mvc:
    # Lanza excepción cuando no encuentra handler
    "[throw-exception-if-no-handler-found]": true
  web:
    resources:
      # Desactiva mapeo automático de recursos estáticos
      add-mappings: false
  # Desactiva la página de error de Whitelabel
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration
  output:
    ansi:
      enabled: DETECT
  application:
    name: ^project.name^
    version: ^project.version^
  jackson:
    time-zone: America/Mexico_City
  datasource:
    url: ${DB_URL:jdbc:postgresql://34.230.57.102:5433/postgres_restore}
    username: ${DB_USER:userdev}
    password: ${DB_PASSWORD:ultr4D3v202506}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1740000
      pool-name: APP_CATALOGO_ADMIN_POOL
      connection-init-sql: ${DB_SEARCH_PATH:SET search_path TO vucem_app_p01_normal_table}
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
      register-mbeans: true
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
      open-in-view: false
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": true
        jdbc:
          "[time_zone]": America/Mexico_City
          "[batch_size]": 25
        "[generate_statistics]": true
        session:
          events:
            log:
              "[LOG_QUERIES_SLOWER_THAN_MS]": 100
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
  config: # Configuraciones de los servicios externos a consumir
    import:
    - classpath:microservicio/ms-ejemplo.yml

logging:
  level:
    root: info
    "[mx.gob.sat]": debug
    "[org.springframework]": error
    "[com.zaxxer.hikari.HikariConfig]": error
    "[org.hibernate]": error
    "[org.hibernate.SQL]": error
    "[org.hibernate.type.descriptor.sql.BasicBinder]": trace
    "[org.hibernate.loader.Loader]": error
    "[org.springframework.boot.autoconfigure]": info
    "[org.springframework.web]": debug
    "[org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor]": trace
    "[com.fasterxml.jackson.databind]": trace

management:
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  opentelemetry:
    enabled: false
    exporter:
      otlp:
        enabled: false  # Deshabilitado
        # Cuando tengas ELK/Jaeger disponible, descomenta y actualiza:
        # enabled: true
        # endpoint: http://localhost:4317        # Jaeger OTLP
        # endpoint: http://elk-server:4317       # ELK Stack
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[spring.data.repository.invocations]": true
      percentiles:
        "[http.server.requests]": 0.5, 0.95, 0.99
        "[spring.data.repository.invocations]": 0.5, 0.95, 0.99
    tags:
      application: ^project.artifactId^
      version: ^project.version^
  web:
    server:
      request:
        autotime:
          enabled: true
  endpoints:
    web:
      base-path: /api/^project.name^/actuator
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
          - loggers
          - circuitbreakers
  endpoint:
    health:
      show-details: always
info:
  app:
    name: ^project.name^
    version: ^project.version^
# Configuración OpenTelemetry
otel:
  java:
    global-autoconfigure:
      enabled: true
  service:
    name: ^project.artifactId^
  resource:
    attributes:
      "[service.name]": ^project.artifactId^
      "[service.version]": ^project.version^

